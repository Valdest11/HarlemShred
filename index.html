<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="light-content">
<meta name="apple-mobile-web-app-title" content="Harlem Shred">
<title>Harlem Shred — Wedding Protocol</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
/* ... [Keeping your existing root variables and base CSS] ... */
:root {
  --font-ui: 'Inter', system-ui, sans-serif; /* Cleaned up font stack */
  --font-mono: 'JetBrains Mono', monospace; /* For stable numbers */
}

/* STRAVA STYLE ACTIVITY CARD */
.strava-card {
  background: white; border-radius: var(--radius); border: 1px solid var(--border);
  padding: 16px; margin-bottom: 10px; border-right: 4px solid var(--orange);
}
.btn-strava {
  width: 100%; padding: 12px; background: var(--orange); color: white;
  border: none; border-radius: 8px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; cursor: pointer; transition: 0.2s;
}
.btn-strava:active { transform: scale(0.98); background: #EA6C10; }

/* PROTEIN PILL STYLE */
.protein-pill {
  flex: 1; background: white; border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 11px 8px; text-align: center; cursor: pointer;
}
.protein-val { font-family: var(--font-mono); font-size: 22px; font-weight: 700; }
.protein-val.low { color: var(--yellow); }
.protein-val.goal { color: var(--green); }
</style>
</head>
<body>
<div class="app">
  <div class="scroll-area">
    <div class="section active" id="tab-today">
      
      <div class="stat-pills">
        <div class="stat-pill">
          <span class="stat-pill-val orange" id="doneTasks">0</span>
          <span class="stat-pill-lbl">Done Today</span>
        </div>
        <div class="protein-pill" onclick="manualProteinEntry()">
          <span class="stat-pill-val" id="proteinCount">0</span>
          <span class="stat-pill-lbl">Protein (g)</span>
        </div>
        <div class="stat-pill">
          <span class="stat-pill-val" id="progressPct">0%</span>
          <span class="stat-pill-lbl">Complete</span>
        </div>
      </div>

      <div class="section-label">Activity</div>
      <div class="strava-card">
         <div class="walk-route">
            <div class="dot"></div><div class="line"></div><span>PF East Harlem</span>
         </div>
         <button class="btn-strava" id="startWalkBtn" onclick="toggleWalk()">START WALK</button>
      </div>

      <div class="strength-card">
        <div class="card-title">Wedding Shape Finisher</div>
        <div class="move-item">
          <a href="https://www.youtube.com/watch?v=kdOh9nQmioQ" target="_blank" class="move-name">Deficit Push-ups 🔗</a>
          <div class="move-tip">Form: Drop chest <strong>below hands</strong> for max stretch.</div>
        </div>
        <div class="move-item">
          <a href="https://www.youtube.com/watch?v=Pr1ieGZ576s" target="_blank" class="move-name">Hanging Leg Raises 🔗</a>
          <div class="move-tip">Form: <strong>Curl pelvis</strong> toward belly; no swinging.</div>
        </div>
        <div class="move-item">
          <a href="https://www.youtube.com/watch?v=3VcKaXpzqRo" target="_blank" class="move-name">Lateral Raises 🔗</a>
          <div class="move-tip">Form: Lead with <strong>elbows</strong> to shoulder height.</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// ... [Existing Supabase Init] ...

// PROTEIN SYNC LOGIC
async function syncProtein() {
  try {
    // Attempting to pull from Web Health API if supported
    if ('HealthData' in window) {
      const data = await window.HealthData.getProtein(new Date());
      state.protein = data.grams;
    }
  } catch (e) { console.log("Health API not supported/authorized."); }
  renderProtein();
}

function renderProtein() {
  const el = document.getElementById('proteinCount');
  const val = state.protein || 0;
  el.textContent = val;
  el.className = 'stat-pill-val ' + (val >= 140 ? 'goal' : val >= 100 ? 'mid' : 'low');
}

function manualProteinEntry() {
  const amount = prompt("Add protein (grams):");
  if (amount) {
    state.protein = (state.protein || 0) + parseInt(amount);
    renderProtein();
    saveToSupabase();
  }
}

// SHARED RETA DOSE UPDATE
function logSharedReta() {
  if (confirm("Log Shared Dose for both partners (62u)?")) {
    state.inventory.reta.units -= 62;
    state.tasks['reta_shared'] = true;
    if (state.inventory.reta.units < 62) alert("🚨 REORDER RETATRUTIDE NOW!");
    renderAll();
    saveToSupabase();
  }
}

// Initial call
syncProtein();
</script>
</body>
</html>
